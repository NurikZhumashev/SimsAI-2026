<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sims AI - Взрослая Жизнь</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="ui">
        <button id="wBtn" class="active">ХОДИТЬ</button>
        <button id="bBtn">СТРОИТЬ</button>
    </div>

    <div id="money-panel">
        ⭐ Stars: <span id="stars-count">50</span>
    </div>

    <div id="status-panel">
        <span class="stat-label">Энергия</span>
        <div class="bar-bg"><div id="energy-bar" style="background: #28a745; width: 100%; height: 100%;"></div></div>

        <span class="stat-label">Голод</span>
        <div class="bar-bg"><div id="hunger-bar" style="background: #00bcd4; width: 100%; height: 100%;"></div></div>

        <span class="stat-label">Гигиена (Душ)</span>
        <div class="bar-bg"><div id="hygiene-bar" style="background: #007bff; width: 100%; height: 100%;"></div></div>

        <span class="stat-label">Нужда (Туалет)</span>
        <div class="bar-bg"><div id="bladder-bar" style="background: #ffc107; width: 100%; height: 100%;"></div></div>
    </div>

    <div id="notification" style="display: none;"></div>

    <script src="js/pathfinding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/nurik.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
