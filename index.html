<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бомж -> Миллиардер</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <header class="stats-bar">
            <div class="stat">💰 <span id="money">0</span></div>
            <div class="stat">🍕 <span id="hunger">0</span>%</div>
            <div class="stat">⚡ <span id="energy">0</span>%</div>
        </header>

        <main class="game-screen">
            <div class="character-area">
                <div id="char-status">Вы на улице. Холодно.</div>
                <div class="level-info">Уровень: <span id="level">1</span></div>
            </div>
        </main>

        <footer class="actions-panel">
            <button id="work-btn" class="btn-main">📦 Рыться в мусоре</button>
            <div class="secondary-actions">
                <button onclick="alert('Скоро: Магазин')" class="btn-sub">🛒 Магазин</button>
                <button onclick="alert('Скоро: Сон')" class="btn-sub">💤 Сон</button>
            </div>
        </footer>
    </div>

    <script src="js/ui.js"></script>
</body>
</html>
