<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sims AI - Изометрия</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style> body { margin: 0; background: #222; overflow: hidden; } </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            scene: { preload: preload, create: create }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // Грузим бесплатный тайл пола (ромбик) прямо из интернета
            this.load.image('tile', 'https://labs.phaser.io/assets/sprites/diamond.png');
        }

        function create() {
            // Центрируем нашу комнату на экране
            const startX = window.innerWidth / 2;
            const startY = 150;
            
            // Размеры одной плитки (магические числа для изометрии)
            const tileWidth = 32;  // Шаг вправо/влево
            const tileHeight = 16; // Шаг вниз/вверх

            // Строим сетку пола 8х8 (наша первая комната!)
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    
                    // 🧠 ТА САМАЯ ИЗОМЕТРИЧЕСКАЯ ФОРМУЛА:
                    // Она переводит обычные координаты (x,y) в "ромбовидные"
                    let isoX = startX + (x - y) * tileWidth;
                    let isoY = startY + (x + y) * tileHeight;

                    // Ставим плитку на вычисленное место
                    let tile = this.add.image(isoX, isoY, 'tile');
                    
                    // Делаем её интерактивной (чтобы игра понимала клики)
                    tile.setInteractive();

                    // Что происходит при наведении и клике:
                    tile.on('pointerover', () => tile.setTint(0x00ff00)); // Зеленеет
                    tile.on('pointerout', () => tile.clearTint());        // Обычная
                    tile.on('pointerdown', () => {
                        tile.setTint(0xff0000); // Краснеет при клике
                        console.log(`Клик по клетке: X:${x}, Y:${y}`);
                    });
                }
            }
            
            this.add.text(20, 20, "SIMS AI: КОМНАТА 8x8 СГЕНЕРИРОВАНА\nВоди мышкой по полу!", { 
                fontSize: '20px', fill: '#0f0', fontFamily: 'Courier' 
            });
        }
    </script>
</body>
</html>
