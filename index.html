<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sims AI - Плавная ходьба</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style> body { margin: 0; background: #222; overflow: hidden; } </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            scene: { preload: preload, create: create }
        };

        const game = new Phaser.Game(config);
        
        let hero;
        let moveTween = null; // Переменная для хранения нашего плавного движения

        function preload() {
            this.load.image('tile', 'https://labs.phaser.io/assets/sprites/diamond.png');
            this.load.image('hero', 'https://labs.phaser.io/assets/sprites/phaser-dude.png');
        }

        function create() {
            const startX = window.innerWidth / 2;
            const startY = 150;
            const tileWidth = 32;  
            const tileHeight = 16; 

            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    let isoX = startX + (x - y) * tileWidth;
                    let isoY = startY + (x + y) * tileHeight;

                    let tile = this.add.image(isoX, isoY, 'tile');
                    tile.setInteractive();

                    tile.on('pointerover', () => tile.setTint(0x00ff00));
                    tile.on('pointerout', () => tile.clearTint());
                    
                    tile.on('pointerdown', () => {
                        tile.setTint(0xff0000); 

                        // Разворачиваем персонажа
                        hero.flipX = (isoX < hero.x);

                        // Считаем дистанцию, чтобы скорость всегда была одинаковой
                        let distance = Phaser.Math.Distance.Between(hero.x, hero.y, isoX, isoY);
                        let duration = (distance / 200) * 1000; // 200 - это скорость

                        // Если он уже куда-то шел - отменяем старый приказ
                        if (moveTween) moveTween.stop();

                        // ЗАПУСКАЕМ ИДЕАЛЬНО ПЛАВНОЕ ДВИЖЕНИЕ
                        moveTween = this.tweens.add({
                            targets: hero,
                            x: isoX,
                            y: isoY,
                            duration: duration,
                            ease: 'Linear' // Идем равномерно, без ускорений
                        });
                    });
                }
            }

            hero = this.add.sprite(startX, startY, 'hero');
            hero.setScale(1.5);
            
            this.add.text(20, 20, "Плавное движение (Твины) активировано!", { fontSize: '18px', fill: '#0f0' });
        }
    </script>
</body>
</html>
